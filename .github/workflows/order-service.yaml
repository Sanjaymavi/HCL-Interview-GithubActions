name: order Service CI

on:
  push:
    branches:
      - main
    paths:
      - 'order-service/**'

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      PROJECT_ID: project-e85d8801-bd70-4ddd-8bc
      REGION: asia-south1
      IMAGE_NAME: order-service

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Maven Build
        run: |
          cd order-service
          mvn clean package

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build Image
        run: |
          docker build \
          -t asia-south1-docker.pkg.dev/${PROJECT_ID}/microservices-repo/${IMAGE_NAME}:${{ github.run_number }} \
          -f order-service/Dockerfile \
          order-service

      - name: Push Image
        run: |
          docker push \
          asia-south1-docker.pkg.dev/${PROJECT_ID}/microservices-repo/${IMAGE_NAME}:${{ github.run_number }}

      - name: Update Manifest
        run: |
          sed -i \
          "s#image:.*#image: asia-south1-docker.pkg.dev/${PROJECT_ID}/microservices-repo/order-service:${{ github.run_number }}#" \
          k8s/order-service/deployment.yaml

      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add k8s/order-service/deployment.yaml

          git commit -m "order-service image update" || exit 0

          git push