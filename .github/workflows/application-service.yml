name: Application Service CI

on:
  push:
    branches:
      - main
    paths:
      - 'application-service/**'



permissions:
  contents: write
  id-token: write

env:
  PROJECT_ID: project-e85d8801-bd70-4ddd-8bc
  REGION: asia-south1
  REPOSITORY: microservices-repo
  IMAGE_NAME: application-service

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build \
          -t asia-south1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${{ github.run_number }} \
          ./application-service

      - name: Push Docker Image
        run: |
          docker push \
          asia-south1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${{ github.run_number }}

      - name: Update Manifest
        run: |
          sed -i \
          "s|image:.*|image: asia-south1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${{ github.run_number }}|g" \
          k8s/application-service/deployment.yaml

      - name: Commit Manifest
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add k8s/application-service/deployment.yaml

          git commit -m "Update application-service image to ${{ github.run_number }}" || exit 0

          git push