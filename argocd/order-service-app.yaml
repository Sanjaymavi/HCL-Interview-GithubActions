apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: order-service
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Sanjaymavi/hackathon-usecase-hcl.git
    targetRevision: main
    path: k8s/order-service

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true