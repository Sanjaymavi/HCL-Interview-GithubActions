apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: application-service-github-action
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Sanjaymavi/HCL-Interview-GithubActions.git
    targetRevision: main
    path: k8s/application-service

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true